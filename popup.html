<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🔊 Article Reader</h1>
    
    <div class="settings">
      <label>
        <input type="radio" name="tts" value="local" id="ttsLocal" checked>
        Local TTS
      </label>
      <label>
        <input type="radio" name="tts" value="elevenlabs" id="ttsElevenlabs">
        ElevenLabs
      </label>
    </div>

    <div id="elevenLabsSettings" style="display: none;">
      <input type="text" id="apiKey" placeholder="Paste ElevenLabs API Key here" />
      <select id="elevenVoice">
        <option value="EXAVITQu4vr4xnSDxMaL">Sarah (default)</option>
        <option value="21m00Tcm4TlvDq8ikWAM">Rachel</option>
        <option value="AZnzlk1XvdvUeBnXmlld">Domi</option>
        <option value="pNInz6obpgDQGcFmaJgB">Adam</option>
      </select>
    </div>

    <div id="localSettings">
      <select id="localVoice">
        <option value="">Select Voice...</option>
      </select>
      <label>
        Speed: <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
        <span id="speedValue">1.0x</span>
      </label>
    </div>

    <div class="controls">
      <button id="playBtn">▶️ Read</button>
      <button id="pauseBtn" disabled>⏸️ Pause</button>
      <button id="stopBtn" disabled>⏹️ Stop</button>
    </div>

    <div id="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
